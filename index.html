<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>大西のポートフォリオ</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 50px;
      }
      h1 {
        color: #333;
      }
      #message {
        font-size: 1.5em;
        margin-top: 40px;
        font-weight: bold;
        transition: color 1s ease; /* 色変更を滑らかに */
      }
    </style>
  </head>
  <body>
    <h1>大西</h1>
    
    <p id="message">時間が足りなくて完璧にできなかったです。すみません</p>

    <script>
      const colors = ['red', 'blue', 'green', 'black'];
      let index = 0;
      const messageElement = document.getElementById('message');

      function changeColor() {
        messageElement.style.color = colors[index];
        index = (index + 1) % colors.length; // 次の色へ（循環）
      }

      // 最初に1回色を適用
      changeColor();

      // 10秒ごとに色を変更
      setInterval(changeColor, 10000);
    </script>
  </body>
</html>
